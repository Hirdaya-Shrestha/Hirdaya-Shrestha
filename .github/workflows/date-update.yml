name: Update Profile Card Date

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Update README cache buster
        run: |
          DATE=$(date +%Y%m%d)
      
          perl -pi -e "s/\?v=\d+/?v=$DATE/g" README.md
      
          git diff README.md || true

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git diff --cached --quiet && exit 0

          git commit -m "chore: update card date"
          git push
